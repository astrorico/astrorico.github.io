<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://raw.githubusercontent.com https://secure.geonames.org">
<title>AstroRico V6</title>
<link rel="stylesheet" href="AstroRico_V6.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js" integrity="sha384-8D3Rsfo535FqoC1pHCCQMrNf75UgzyoG/HQm9zOzITRrz3QKzecc2E7JXKGCXoWu" crossorigin="anonymous"></script>
</head>
<body>
<a href="index.html" style="display:inline-flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none;font-family:Arial,sans-serif;padding:12px 0 0 12px;">
  <img src="logo_astro.png" alt="Início" style="width:32px;height:32px;border-radius:50%;object-fit:cover;display:block;">
  <span style="font-size:12px;color:#333;text-align:center;line-height:1.3;background:#fff;padding:2px 8px;border-radius:6px;">Home</span>
</a>
<div class="container">
<div class="card">
<h1>✦ AstroRico V6</h1>

<!-- Carregar Mapa Salvo (banco de mapas) -->
<details id="mapas-details" style="margin-bottom:14px">
<summary>&#128193; Carregar Mapa Salvo</summary>
<div style="margin-bottom:8px">
  <label style="font-size:12px;color:var(--color-text-secondary)">Endereço do banco (raw GitHub)</label>
  <input type="text" id="mapas_url_input" value="" placeholder="https://raw.githubusercontent.com/usuario/repo/main/arquivo.map"
    style="width:100%;box-sizing:border-box;padding:6px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:12px">
</div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
  <input type="file" id="mapas_file_input" accept=".map,.db,.sqlite" style="display:none" onchange="mapasFilePicked(this)">
  <button type="button" onclick="document.getElementById('mapas_file_input').click()"
    style="padding:6px 12px;background:var(--color-brand-auto);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:bold;cursor:pointer">&#128193; Arquivo no celular/PC</button>
  <button type="button" onclick="loadMapasOnline()"
    style="padding:6px 12px;background:#0d9488;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:bold;cursor:pointer">&#127760; Carregar online</button>
  <button type="button" onclick="mapaSaveCurrent()"
    style="padding:6px 12px;background:#16a34a;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:bold;cursor:pointer">&#128190; Salvar mapa atual no banco</button>
</div>
<div id="mapas_status" style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px"></div>
<div id="mapas_search_box" style="display:none;position:relative;max-width:360px">
  <input type="text" id="mapas_search_input" placeholder="Digite o nome da pessoa..." autocomplete="off"
    style="width:100%;box-sizing:border-box;padding:8px 12px;border:1.5px solid #ddd;border-radius:6px;font-size:14px"
    oninput="mapaSearch(this.value)" onfocus="mapaSearch(this.value)">
  <ul id="mapas_ac_list" style="position:absolute;top:calc(100% + 2px);left:0;width:100%;max-height:220px;overflow-y:auto;background:#fff;border:1px solid var(--color-border);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:9999;list-style:none;margin:0;padding:4px 0;display:none;font-size:13px"></ul>
</div>
</details>

<!-- Nome do Mapa -->
<div class="asc-group">
  <div class="input-group" style="flex:1 1 100%">
    <label>Nome do Mapa</label>
    <input type="text" id="mapaNome" placeholder="Nome do mapa" style="width:100%;box-sizing:border-box;padding:6px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:14px"></div>
</div>

<!-- Data + Hora + ASC manual -->
<div class="asc-group">
  <div class="input-group" style="width:120px"><label>Data de Nascimento</label>
    <input type="text" id="birthDate" inputmode="numeric" placeholder="DD/MM/AAAA" maxlength="10"
      onfocus="this.value='';markBirthDateValidity(this)" oninput="qmFormatDate(this);markBirthDateValidity(this)"
      style="padding:6px 10px;border:1px solid var(--color-border-input);border-radius:6px;font-size:13px;background:#fff;width:120px;text-align:center;letter-spacing:1px"></div>
  <div class="input-group" style="width:100px"><label>Hora</label>
    <input type="text" id="birthTime" class="input-hora" placeholder="00:00:00" maxlength="8" inputmode="numeric"
      onfocus="this.value=''" oninput="qmFormatTime(this)" style="text-align:center;letter-spacing:1px"></div>
  <div class="input-group"><label>Hor. Verão</label>
    <label style="display:flex;align-items:center;gap:6px;margin:0;font-weight:normal;text-transform:none;letter-spacing:0">
      <input type="checkbox" id="dst" style="width:auto"> +1h</label></div>
  <div class="input-group"><label>Signo do ASC</label>
    <select id="ascSign" onchange="ascSignChanged()">
      <option value="0">Áries</option><option value="1">Touro</option>
      <option value="2">Gêmeos</option><option value="3">Câncer</option>
      <option value="4">Leão</option><option value="5">Virgem</option>
      <option value="6">Libra</option><option value="7">Escorpião</option>
      <option value="8">Sagitário</option><option value="9">Capricórnio</option>
      <option value="10">Aquário</option><option value="11">Peixes</option>
    </select></div>
  <div class="input-group" style="width:110px"><label title="2 dígitos=grau · 4=grau+min · 6=grau+min+seg">Grau</label>
    <input type="text" id="ascDegMin" maxlength="9"
      placeholder="00º00'00&quot;" style="width:110px;letter-spacing:2px;font-family:monospace;text-align:center"
      onfocus="this.value=''" oninput="this.value=this.value.replace(/[^\d°\'\&quot;]/g,'').slice(0,9)"></div>
</div>

<!-- Local (expandível) -->
<details id="local-details">
<summary>&#127757; Local de Nascimento (para Mandala)</summary>

<div style="margin-bottom:8px">
  <label style="display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:4px">GeoNames Username</label>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
    <input type="text" id="geonames_user" placeholder="seu_usuario" autocomplete="off"
      style="width:160px;padding:6px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px">
    <button type="button" onclick="testGeonames()"
      style="padding:6px 12px;background:var(--color-brand-auto);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:bold;cursor:pointer">Testar</button>
    <a href="https://www.geonames.org/login" target="_blank"
      style="font-size:11px;color:var(--color-brand-auto);text-decoration:none">criar conta</a>
  </div>
  <div id="geonames_test_result" style="display:none;margin-top:6px;font-size:12px"></div>
</div>

<div style="margin-bottom:10px">
  <label style="display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:4px">&#127758; Cidade de Nascimento</label>
  <div style="position:relative;display:inline-block;width:100%;max-width:360px">
    <input type="text" id="loc_search_input" placeholder="Digite o nome da cidade..." autocomplete="off"
      style="width:100%;box-sizing:border-box;padding:8px 12px;border:1.5px solid #ddd;border-radius:6px;font-size:14px">
    <ul id="loc_ac_list" style="position:absolute;top:calc(100% + 2px);left:0;width:100%;max-height:220px;overflow-y:auto;background:#fff;border:1px solid var(--color-border);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:9999;list-style:none;margin:0;padding:4px 0;display:none;font-size:13px"></ul>
  </div>
  <div id="loc_selected_box" style="display:none;margin-top:6px;background:#f0f7ff;border:1px solid #bdd6f5;border-radius:6px;padding:8px 12px;font-size:12px;color:var(--color-text-primary);max-width:360px;box-sizing:border-box">
    <button type="button" onclick="locClear()" style="float:right;background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:13px;padding:0">&#10005;</button>
    <div id="loc_sel_name" style="font-weight:700;color:var(--color-accent)"></div>
    <div id="loc_sel_detail" style="color:var(--color-text-secondary);margin-top:2px"></div>
  </div>
</div>

<div class="local-row" id="loc_coords_row">
  <div class="input-group"><label>Latitude</label>
    <input type="number" id="lat" step="0.001" value="-22.9068" placeholder="-22.9068" style="width:110px"></div>
  <div class="input-group"><label>Longitude</label>
    <input type="number" id="lon" step="0.001" value="-43.1729" placeholder="-43.1729" style="width:110px"></div>
  <div class="input-group"><label>Fuso UTC&#177;</label>
    <input type="number" id="tzOffset" value="-3" step="0.5" min="-12" max="14" style="width:65px"></div>
</div>
<div style="margin-top:10px">
  <div id="wasm-status"></div>
</div>
</details>

<!-- Tabs -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('mandala')">Mandala</button>
  <button class="tab-btn" onclick="showTab('lotes')">Lotes</button>
  <button class="tab-btn" onclick="showTab('profecao')">Profeção</button>
  <button class="tab-btn" onclick="showTab('firdaria')">Firdaria</button>
  <button class="tab-btn" onclick="showTab('liberacao')">Liberação</button>
  <button class="tab-btn" onclick="showTab('direcoes')">Direções</button>
  <button class="tab-btn" onclick="showTab('revolucao')">Revolução Solar</button>
  <button class="tab-btn" onclick="showTab('decenais')">Decenais</button>
  <button class="tab-btn" onclick="showTab('antigenesis')">Antigenesis</button>
  <button class="tab-btn" onclick="showTab('transitos')">Trânsitos</button>
  <button class="tab-btn" onclick="showTab('geral')">Análise Geral</button>
</div>

<div id="tab-firdaria" style="display:none">
  <div class="asc-group" style="margin-top:12px">
    <div class="input-group"><label>Nascimento <span id="fird-auto-label" style="font-weight:normal;text-transform:none;letter-spacing:0;color:#888;font-size:11px"></span></label>
      <div class="btn-container">
        <button class="btn-auto active" onclick="setChartType('auto')">⟳ Auto</button>
        <button class="btn-day" onclick="setChartType('day')">&#9728; Diurno</button>
        <button class="btn-night" onclick="setChartType('night')">&#9789; Noturno</button>
      </div></div>
  </div>
  <div class="btn-row"><button class="btn-calculate" onclick="calculate()">Calcular Firdaria</button></div>
</div>
<div id="tab-profecao" style="display:none">
  <div style="padding:10px 0 8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div>
      <label style="font-size:11px;color:#555;display:block;margin-bottom:2px">Ponto Profectado</label>
      <select id="prof-point-sel" style="padding:6px 10px;border:1px solid var(--color-border-input);border-radius:6px;font-size:13px;background:#fff;cursor:pointer">
        <option value="asc" selected>ASC (Ascendente)</option>
        <option value="sol">☉ Sol</option>
        <option value="lua">☽ Lua</option>
        <option value="mer">☿ Mercúrio</option>
        <option value="ven">♀ Vênus</option>
        <option value="mar">♂ Marte</option>
        <option value="jup">♃ Júpiter</option>
        <option value="sat">♄ Saturno</option>
        <option value="fortune">☽ L. Fortuna</option>
        <option value="spirit">☉ L. Espírito</option>
      </select>
    </div>
    <div>
      <label style="font-size:11px;color:#555;display:block;margin-bottom:2px">Data alvo (opcional)</label>
      <input type="text" inputmode="numeric" placeholder="DD/MM/AAAA" maxlength="10" oninput="qmFormatDate(this)" onfocus="this.value=''" style="padding:6px 10px;border:1px solid var(--color-border-input);border-radius:6px;font-size:13px;background:#fff;width:120px;text-align:center;letter-spacing:1px" id="prof-target-date">
    </div>
    <button class="btn-calculate-profecao" onclick="calculateProfecao()" style="margin-top:16px">Calcular Profeção</button>
    <span style="font-size:12px;color:#666;margin-left:8px">Sem data alvo, será feita a tabela geral.</span>
  </div>
</div>
<div id="tab-mandala">
  <div class="btn-row"><button class="btn-calculate-mapa" onclick="calculateMapa()">Calcular Mapa</button></div>
</div>
<div id="tab-lotes" style="display:none">
  <div class="btn-row"><button class="btn-calculate-mapa" onclick="calculateLotes()">Calcular Lotes Árabes</button></div>
</div>
<div id="tab-liberacao" style="display:none">
  <div style="padding:10px 0 8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div>
      <label style="font-size:11px;color:#555;display:block;margin-bottom:2px">&nbsp;</label>
      <select id="vl-sign-sel" style="padding:6px 10px;border:1px solid var(--color-border-input);border-radius:6px;font-size:13px;background:#fff;cursor:pointer">
        <option value="-1">☽ L. Fortuna</option>
        <option value="0">♈ Áries</option><option value="1">♉ Touro</option>
        <option value="2">♊ Gêmeos</option><option value="3">♋ Câncer</option>
        <option value="4">♌ Leão</option><option value="5">♍ Virgem</option>
        <option value="6">♎ Libra</option><option value="7">♏ Escorpião</option>
        <option value="8">♐ Sagitário</option><option value="9">♑ Capricórnio</option>
        <option value="10">♒ Aquário</option><option value="11">♓ Peixes</option>
      </select>
    </div>
    <div>
      <label style="font-size:11px;color:#555;display:block;margin-bottom:2px">Data alvo (opcional)</label>
      <input type="text" inputmode="numeric" placeholder="DD/MM/AAAA" maxlength="10" oninput="qmFormatDate(this)" onfocus="this.value=''" style="padding:6px 10px;border:1px solid var(--color-border-input);border-radius:6px;font-size:13px;background:#fff;width:120px;text-align:center;letter-spacing:1px" id="vl-target-date">
    </div>
    <button class="btn-calculate-mapa" onclick="calculateLiberacao()" style="padding:6px 18px;margin-top:16px">Calcular</button>
  </div>
  <div id="vl-result" style="margin-top:6px"></div>
</div>
<div id="tab-direcoes" style="display:none">
  <div style="padding:10px 0 8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div>
      <label style="font-size:11px;color:#555;display:block;margin-bottom:2px">Ponto Direcionado</label>
      <select id="dir-point-sel" style="padding:6px 10px;border:1px solid var(--color-border-input);border-radius:6px;font-size:13px;background:#fff;cursor:pointer">
        <option value="asc" selected>ASC (Ascendente)</option>
        <option value="sol">☉ Sol</option>
        <option value="lua">☽ Lua</option>
        <option value="mer">☿ Mercúrio</option>
        <option value="ven">♀ Vênus</option>
        <option value="mar">♂ Marte</option>
        <option value="jup">♃ Júpiter</option>
        <option value="sat">♄ Saturno</option>
        <option value="fortune">☽ L. Fortuna</option>
        <option value="spirit">☉ L. Espírito</option>
      </select>
    </div>
    <div>
      <label style="font-size:11px;color:#555;display:block;margin-bottom:2px">Data alvo</label>
      <input type="text" inputmode="numeric" placeholder="DD/MM/AAAA" maxlength="10" oninput="qmFormatDate(this)" onfocus="this.value=''" style="padding:6px 10px;border:1px solid var(--color-border-input);border-radius:6px;font-size:13px;background:#fff;width:120px;text-align:center;letter-spacing:1px" id="dir-target-date">
    </div>
    <button class="btn-calculate-mapa" onclick="calculateDirecoes()" style="padding:6px 18px;margin-top:16px">Calcular</button>
  </div>
  <div id="dir-result" style="margin-top:6px"></div>
</div>
<div id="tab-revolucao" style="display:none">
  <div style="padding:10px 0 8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div>
      <label style="font-size:11px;color:#555;display:block;margin-bottom:2px">Data do Evento</label>
      <input type="text" inputmode="numeric" placeholder="DD/MM/AAAA" maxlength="10" oninput="qmFormatDate(this)" onfocus="this.value=''" style="padding:6px 10px;border:1px solid var(--color-border-input);border-radius:6px;font-size:13px;background:#fff;width:120px;text-align:center;letter-spacing:1px" id="rs-event-date">
    </div>
    <button class="btn-calculate-mapa" onclick="calculateRevolucaoSolar()" style="padding:6px 18px;margin-top:16px">Calcular Revolução Solar</button>
  </div>
  <div id="rs-result" style="margin-top:6px"></div>
</div>
<div id="tab-decenais" style="display:none">
  <div style="padding:10px 0 8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div>
      <label style="font-size:11px;color:#555;display:block;margin-bottom:2px">Significador (Apheta)</label>
      <select id="dec-apheta-sel" style="padding:6px 10px;border:1px solid var(--color-border-input);border-radius:6px;font-size:13px;background:#fff;cursor:pointer">
        <option value="asc_ruler">Reg. Asc</option>
        <option value="sect">Luminar sect</option>
        <option value="valens">⚖ Método Valens</option>
        <option value="sun">☉ Sol</option>
        <option value="moo">☽ Lua</option>
        <option value="mer">☿ Mercúrio</option>
        <option value="ven">♀ Vênus</option>
        <option value="mar">♂ Marte</option>
        <option value="jup">♃ Júpiter</option>
        <option value="sat">♄ Saturno</option>
      </select>
    </div>
    <div>
      <label style="font-size:11px;color:#555;display:block;margin-bottom:2px">Data Alvo</label>
      <input type="text" inputmode="numeric" placeholder="DD/MM/AAAA" maxlength="10" oninput="qmFormatDate(this)" onfocus="this.value=''" style="padding:6px 10px;border:1px solid var(--color-border-input);border-radius:6px;font-size:13px;background:#fff;width:120px;text-align:center;letter-spacing:1px" id="dec-target-date">
    </div>
    <button class="btn-calculate-mapa" onclick="calculateDecenais()" style="padding:6px 18px;margin-top:16px">Ver Decenais</button>
  </div>
  <div id="dec-result" style="margin-top:6px"></div>
</div>
<div id="tab-antigenesis" style="display:none">
  <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:10px">
    <!-- Coluna Parâmetros -->
    <div style="flex:1;min-width:280px;padding:14px 16px;background:#fff;border-radius:8px;border:1px solid var(--color-border);display:flex;flex-direction:column">
      <div style="display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap">
        <div>
          <label style="font-size:11px;color:#555;display:block;margin-bottom:2px">Data do Evento</label>
          <input type="text" inputmode="numeric" placeholder="DD/MM/AAAA" maxlength="10" oninput="qmFormatDate(this)" onfocus="this.value=''" style="padding:6px 10px;border:1px solid var(--color-border-input);border-radius:6px;font-size:13px;background:#fff;width:120px;text-align:center;letter-spacing:1px" id="ag-event-date">
        </div>
        <button class="btn-calculate-mapa" onclick="calculateAntigenesis()" style="padding:6px 18px;margin-top:16px">Calcular Antigenesis</button>
      </div>
    </div>
  </div>
  <div id="ag-result" style="margin-top:6px"></div>
</div>
<div id="tab-transitos" style="display:none">
  <div style="padding:10px 0 8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div>
      <label style="font-size:11px;color:#555;display:block;margin-bottom:2px">Data do Trânsito</label>
      <input type="text" inputmode="numeric" placeholder="DD/MM/AAAA" maxlength="10" onfocus="this.value=''" oninput="qmFormatDate(this)" style="padding:6px 10px;border:1px solid var(--color-border-input);border-radius:6px;font-size:13px;background:#fff;width:120px;text-align:center;letter-spacing:1px" id="tr-target-date">
    </div>
    <button class="btn-calculate-mapa" onclick="calculateTransitos()" style="padding:6px 18px;margin-top:16px">Calcular Trânsitos</button>
  </div>
  <div id="tr-result" style="margin-top:6px"></div>
</div>
<div id="tab-geral" style="display:none">
  <div style="padding:10px 0 8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div>
      <label style="font-size:11px;color:#555;display:block;margin-bottom:2px">Data da Análise</label>
      <input type="text" inputmode="numeric" placeholder="DD/MM/AAAA" maxlength="10" onfocus="this.value=''" oninput="qmFormatDate(this)" style="padding:6px 10px;border:1px solid var(--color-border-input);border-radius:6px;font-size:13px;background:#fff;width:120px;text-align:center;letter-spacing:1px" id="vg-target-date">
    </div>
    <button class="btn-calculate-mapa" onclick="calculateAnaliseGeral()" style="padding:6px 18px;margin-top:16px">Calcular Análise Geral</button>
  </div>
  <div id="vg-result" style="margin-top:6px"></div>
</div>
</div><!-- /card -->

<!-- ⚠️ ATENÇÃO ESTRUTURAL — NÃO ANINHAR OS CONTAINERS ABAIXO DENTRO DESTE DIV
     Este div é esvaziado via innerHTML toda vez que Firdaria ou Profeção calculam.
     Se mandala-container ou lotes-container ficarem dentro dele, serão DELETADOS
     ao clicar nesses botões, quebrando o botão "Calcular Mapa" permanentemente.
     A div#results DEVE permanecer vazia aqui no HTML (conteúdo só via JS). -->
<div id="results" class="results" style="display:none"></div>

<!-- ⚠️ mandala-container DEVE ficar FORA do div#results — veja comentário acima -->
<div id="mandala-container" class="card" style="display:none">
  <canvas id="mandala-canvas" width="860" height="860"></canvas>
  <div id="mandala-info" style="margin-top:12px;font-size:13px;color:#555;text-align:left"></div>
</div>

<!-- ⚠️ lotes-container DEVE ficar FORA do div#results — veja comentário acima -->
<div id="lotes-container" style="display:none"></div>

</div><!-- /container -->

<script src="AstroRico_V6.ephemeris.js"></script>

<script src="AstroRico_V6.js"></script>
</body>
