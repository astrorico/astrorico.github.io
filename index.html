<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artes do Céu e do Rosto</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0b1420;
    --surface:  #111e30;
    --border:   #1e3352;
    --gold:     #c9a84c;
    --gold-dim: #7a6330;
    --parch:    #e2cfa0;
    --text-dim: #7a9ab8;
    --glow:     rgba(201,168,76,.18);
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--parch);
    overflow-x: hidden;
  }

  /* ── star canvas ── */
  canvas#stars {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── layout ── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    gap: 56px;
  }

  /* ── header ── */
  .header {
    text-align: center;
    animation: fadeUp .9s ease both;
  }

  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: .7;
    margin-bottom: 16px;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    font-weight: 300;
    line-height: 1.1;
    color: var(--parch);
    letter-spacing: .02em;
  }

  .title em {
    font-style: italic;
    color: var(--gold);
  }

  .divider {
    width: 48px;
    height: 1px;
    background: var(--gold-dim);
    margin: 20px auto 0;
  }

  /* ── cards ── */
  .cards {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp .9s .18s ease both;
  }

  .card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    width: 260px;
    padding: 44px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: border-color .3s, box-shadow .3s, transform .3s;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, var(--glow) 0%, transparent 70%);
    opacity: 0;
    transition: opacity .4s;
  }

  .card:hover {
    border-color: var(--gold-dim);
    box-shadow: 0 0 48px rgba(201,168,76,.1), 0 8px 32px rgba(0,0,0,.4);
    transform: translateY(-4px);
  }

  .card:hover::before { opacity: 1; }

  .card-glyph {
    font-size: 3rem;
    line-height: 1;
    filter: drop-shadow(0 0 8px var(--gold));
    transition: filter .3s, transform .3s;
  }

  .card:hover .card-glyph {
    filter: drop-shadow(0 0 16px var(--gold));
    transform: scale(1.08);
  }

  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.55rem;
    font-weight: 400;
    letter-spacing: .04em;
    color: var(--parch);
    text-align: center;
  }

  .card-sub {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: center;
  }

  .card-arrow {
    font-size: 13px;
    color: var(--gold);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .25s, transform .25s;
  }

  .card:hover .card-arrow {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── footer ── */
  .footer {
    font-size: 11px;
    letter-spacing: .12em;
    color: var(--text-dim);
    opacity: .45;
    animation: fadeUp .9s .35s ease both;
  }

  /* ── animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  @media (max-width: 480px) {
    .cards { flex-direction: column; align-items: center; }
    .card  { width: 100%; max-width: 300px; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="page">

  <header class="header">
    <p class="eyebrow">Conhecimentos Tradicionais</p>
    <h1 class="title">Astros &amp;<br><em>Fisiognomonia</em></h1>
    <div class="divider"></div>
  </header>

  <nav class="cards">

    <a href="astro.html" target="_blank" rel="noopener" class="card">
      <span class="card-glyph">☽</span>
      <span class="card-name">Astrologia</span>
      <span class="card-sub">Mapas &amp; Firdaria</span>
      <span class="card-arrow">Abrir →</span>
    </a>

    <a href="fisiognomonia-v1.html" target="_blank" rel="noopener" class="card">
      <span class="card-glyph">◉</span>
      <span class="card-name">Fisiognomonia</span>
      <span class="card-sub">Rosto &amp; Caráter</span>
      <span class="card-arrow">Abrir →</span>
    </a>

  </nav>

  <footer class="footer">Selecione uma ferramenta para abrir</footer>

</div>

<script>
// Minimal star field
(function(){
  const canvas = document.getElementById('stars');
  const ctx    = canvas.getContext('2d');
  let stars    = [];
  let W, H;

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function seed(){
    stars = [];
    const n = Math.floor((W * H) / 5000);
    for(let i = 0; i < n; i++){
      stars.push({
        x:  Math.random() * W,
        y:  Math.random() * H,
        r:  Math.random() * 1.1 + .2,
        a:  Math.random(),
        da: (Math.random() * .004 + .001) * (Math.random() < .5 ? 1 : -1)
      });
    }
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);
    for(const s of stars){
      s.a += s.da;
      if(s.a > 1 || s.a < 0) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,168,76,${s.a * .6})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); seed(); });
  resize(); seed(); draw();
})();
</script>
</body>
</html>
